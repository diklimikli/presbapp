<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Choose an Option</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: monospace;
        }
        
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #1f1c2c, #928dab);
            overflow: hidden;
            flex-direction: column;
        }

        .container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
        }

        .option {
            width: 280px;
            height: 180px;
            backdrop-filter: blur(15px);
            background: rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 22px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease, background 0.3s;
            box-shadow: 0px 5px 15px rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .option:hover {
            transform: scale(1.05);
            box-shadow: 0px 10px 25px rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.25);
        }

        .return-btn {
            margin-top: 30px;
            padding: 12px 24px;
            font-size: 18px;
            font-weight: bold;
            color: white;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.3s, transform 0.2s;
        }

        .return-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.05);
        }

        @media (min-width: 600px) {
            .container {
                flex-direction: row;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="option" onclick="selectOption(this, 'bibolka/index.html')">Bibolka</div>
        <div class="option" onclick="selectOption(this, 'book/index.html')">Énekeskönyv (fejlesztés alatt)</div>
    </div>

    
    <script>
        function selectOption(element, path) {
            const options = document.querySelectorAll('.option');
            options.forEach(option => option.classList.remove('selected'));
            element.classList.add('selected');
            setTimeout(() => {
                window.location.href = path;
            }, 300);
        }

        function goBack() {
            window.history.back();
        }
    </script>
</body>
</html>
